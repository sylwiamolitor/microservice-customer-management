services:
  eureka-service:
    container_name: eureka-service
    image: eureka-server
    build:
      context: ./eureka-server
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
    networks:
      - backend

  postgres:
    image: postgres:18
    container_name: postgres
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - backend
    restart: unless-stopped

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - backend

  customer:
    container_name: customer
    image: customer
    build:
      context: ./customer
    ports:
      - "8090:8090"
    env_file:
      - .env
    depends_on:
      - postgres
      - eureka-service
      - fraud
    networks:
      - backend

  fraud:
    container_name: fraud
    image: fraud
    build:
      context: ./fraud
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      - postgres
      - eureka-service
    networks:
      - backend

  gateway-service:
    container_name: gateway-service
    image: gateway-service
    build:
      context: ./gateway-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    depends_on:
      - eureka-service
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  pgadmin:
